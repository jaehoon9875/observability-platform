<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 480" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arrowO" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f97316"/>
    </marker>
    <marker id="arrowG" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
    <marker id="arrowP" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a855f7"/>
    </marker>
    <filter id="sh2" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000025"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="920" height="480" fill="#0f172a" rx="12"/>

  <!-- Title -->
  <text x="460" y="34" text-anchor="middle" font-size="17" font-weight="700" fill="#f1f5f9">Observability 스택 데이터 흐름</text>
  <text x="460" y="52" text-anchor="middle" font-size="11" fill="#64748b">Application → Alloy → Loki / Prometheus / Tempo → Grafana</text>

  <!-- ========== COL 1: Applications ========== -->
  <rect x="20" y="68" width="172" height="344" rx="10" fill="#1e1b4b" stroke="#6366f1" stroke-width="1.5" filter="url(#sh2)"/>
  <rect x="20" y="68" width="172" height="28" rx="10" fill="#4338ca"/>
  <rect x="20" y="85" width="172" height="11" fill="#4338ca"/>
  <text x="106" y="87" text-anchor="middle" font-size="11" font-weight="700" fill="#c7d2fe">Applications</text>

  <!-- order -->
  <rect x="34" y="106" width="144" height="82" rx="7" fill="#312e81" stroke="#6366f1" stroke-width="1"/>
  <text x="106" y="123" text-anchor="middle" font-size="10" font-weight="700" fill="#a5b4fc">🛒 order-service</text>
  <text x="106" y="140" text-anchor="middle" font-size="9" fill="#c7d2fe">Micrometer (메트릭)</text>
  <text x="106" y="155" text-anchor="middle" font-size="9" fill="#c7d2fe">OTel SDK (트레이스)</text>
  <text x="106" y="170" text-anchor="middle" font-size="9" fill="#c7d2fe">Logback JSON (로그)</text>

  <!-- payment -->
  <rect x="34" y="202" width="144" height="82" rx="7" fill="#312e81" stroke="#6366f1" stroke-width="1"/>
  <text x="106" y="219" text-anchor="middle" font-size="10" font-weight="700" fill="#a5b4fc">💳 payment-service</text>
  <text x="106" y="236" text-anchor="middle" font-size="9" fill="#c7d2fe">Micrometer (메트릭)</text>
  <text x="106" y="251" text-anchor="middle" font-size="9" fill="#c7d2fe">OTel SDK (트레이스)</text>
  <text x="106" y="266" text-anchor="middle" font-size="9" fill="#c7d2fe">Logback JSON (로그)</text>

  <!-- notification -->
  <rect x="34" y="298" width="144" height="82" rx="7" fill="#312e81" stroke="#6366f1" stroke-width="1"/>
  <text x="106" y="315" text-anchor="middle" font-size="10" font-weight="700" fill="#a5b4fc">🔔 notification-service</text>
  <text x="106" y="332" text-anchor="middle" font-size="9" fill="#c7d2fe">Micrometer (메트릭)</text>
  <text x="106" y="347" text-anchor="middle" font-size="9" fill="#c7d2fe">OTel SDK (트레이스)</text>
  <text x="106" y="362" text-anchor="middle" font-size="9" fill="#c7d2fe">Logback JSON (로그)</text>

  <!-- Kafka row -->
  <rect x="34" y="394" width="144" height="12" rx="4" fill="#1e3a2a" stroke="#22c55e" stroke-width="1"/>
  <text x="106" y="404" text-anchor="middle" font-size="8" fill="#86efac">Kafka (Strimzi)</text>

  <!-- ========== COL 2: Alloy ========== -->
  <rect x="212" y="68" width="152" height="344" rx="10" fill="#1c1917" stroke="#f97316" stroke-width="1.5" filter="url(#sh2)"/>
  <rect x="212" y="68" width="152" height="28" rx="10" fill="#c2410c"/>
  <rect x="212" y="85" width="152" height="11" fill="#c2410c"/>
  <text x="288" y="87" text-anchor="middle" font-size="11" font-weight="700" fill="#fed7aa">Grafana Alloy</text>

  <text x="288" y="110" text-anchor="middle" font-size="9" fill="#fb923c">수집 에이전트 (DaemonSet)</text>

  <!-- Log -->
  <rect x="226" y="120" width="124" height="76" rx="6" fill="#431407" stroke="#f97316" stroke-width="1"/>
  <text x="288" y="137" text-anchor="middle" font-size="10" font-weight="700" fill="#fdba74">로그 파이프라인</text>
  <text x="288" y="153" text-anchor="middle" font-size="9" fill="#fed7aa">loki.source.kubernetes</text>
  <text x="288" y="168" text-anchor="middle" font-size="9" fill="#fed7aa">stage.json (파싱)</text>
  <text x="288" y="183" text-anchor="middle" font-size="9" fill="#fed7aa">→ loki.write</text>

  <!-- Metrics -->
  <rect x="226" y="210" width="124" height="62" rx="6" fill="#431407" stroke="#f97316" stroke-width="1"/>
  <text x="288" y="227" text-anchor="middle" font-size="10" font-weight="700" fill="#fdba74">메트릭 수집</text>
  <text x="288" y="243" text-anchor="middle" font-size="9" fill="#fed7aa">prometheus.scrape</text>
  <text x="288" y="259" text-anchor="middle" font-size="9" fill="#fed7aa">/actuator/prometheus</text>

  <!-- Traces -->
  <rect x="226" y="286" width="124" height="62" rx="6" fill="#431407" stroke="#f97316" stroke-width="1"/>
  <text x="288" y="303" text-anchor="middle" font-size="10" font-weight="700" fill="#fdba74">트레이스 수집</text>
  <text x="288" y="319" text-anchor="middle" font-size="9" fill="#fed7aa">OTel Receiver (gRPC)</text>
  <text x="288" y="335" text-anchor="middle" font-size="9" fill="#fed7aa">→ Tempo export</text>

  <!-- Kafka exporter -->
  <rect x="226" y="362" width="124" height="40" rx="6" fill="#431407" stroke="#f97316" stroke-width="1"/>
  <text x="288" y="378" text-anchor="middle" font-size="9" font-weight="700" fill="#fdba74">Custom Kafka Lag Exporter</text>
  <text x="288" y="393" text-anchor="middle" font-size="9" fill="#fed7aa">Kafka Lag → Prometheus</text>

  <!-- ========== ARROWS App → Alloy ========== -->
  <line x1="178" y1="147" x2="224" y2="158" stroke="#f97316" stroke-width="1.5" marker-end="url(#arrowO)"/>
  <line x1="178" y1="243" x2="224" y2="175" stroke="#f97316" stroke-width="1.5" marker-end="url(#arrowO)"/>
  <line x1="178" y1="339" x2="224" y2="183" stroke="#f97316" stroke-width="1.5" marker-end="url(#arrowO)"/>

  <line x1="178" y1="243" x2="224" y2="243" stroke="#f97316" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#arrowO)"/>
  <line x1="178" y1="339" x2="224" y2="317" stroke="#f97316" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#arrowO)"/>

  <!-- ========== COL 3: Backends ========== -->
  <rect x="384" y="68" width="324" height="344" rx="10" fill="#0c1a0c" stroke="#22c55e" stroke-width="1.5" filter="url(#sh2)"/>
  <rect x="384" y="68" width="324" height="28" rx="10" fill="#15803d"/>
  <rect x="384" y="85" width="324" height="11" fill="#15803d"/>
  <text x="546" y="87" text-anchor="middle" font-size="11" font-weight="700" fill="#bbf7d0">Observability Backend</text>

  <!-- Loki -->
  <rect x="396" y="104" width="140" height="136" rx="7" fill="#052e16" stroke="#22c55e" stroke-width="1"/>
  <text x="466" y="122" text-anchor="middle" font-size="11" font-weight="700" fill="#86efac">📝 Loki</text>
  <text x="466" y="139" text-anchor="middle" font-size="9" fill="#bbf7d0">로그 저장</text>
  <text x="466" y="156" text-anchor="middle" font-size="9" fill="#86efac">라벨 기반 인덱싱</text>
  <text x="466" y="172" text-anchor="middle" font-size="9" fill="#86efac">trace_id는 로그 본문 유지</text>
  <text x="466" y="188" text-anchor="middle" font-size="9" fill="#4ade80">(라벨 카디널리티 방지)</text>
  <text x="466" y="205" text-anchor="middle" font-size="9" fill="#86efac">| json 쿼리 시 파싱</text>
  <text x="466" y="222" text-anchor="middle" font-size="9" fill="#86efac">Loki ↔ Tempo 연동</text>

  <!-- Prometheus -->
  <rect x="556" y="104" width="140" height="136" rx="7" fill="#052e16" stroke="#22c55e" stroke-width="1"/>
  <text x="626" y="122" text-anchor="middle" font-size="11" font-weight="700" fill="#86efac">📊 Prometheus</text>
  <text x="626" y="139" text-anchor="middle" font-size="9" fill="#bbf7d0">메트릭 저장</text>
  <text x="626" y="156" text-anchor="middle" font-size="9" fill="#86efac">SLO Alert Rules</text>
  <text x="626" y="172" text-anchor="middle" font-size="9" fill="#86efac">Exemplar 지원</text>
  <text x="626" y="188" text-anchor="middle" font-size="9" fill="#86efac">(trace_id 포함)</text>
  <text x="626" y="205" text-anchor="middle" font-size="9" fill="#86efac">kube-prometheus-stack</text>

  <!-- Tempo -->
  <rect x="396" y="254" width="300" height="136" rx="7" fill="#052e16" stroke="#22c55e" stroke-width="1"/>
  <text x="546" y="272" text-anchor="middle" font-size="11" font-weight="700" fill="#86efac">🔍 Tempo</text>
  <text x="546" y="289" text-anchor="middle" font-size="9" fill="#bbf7d0">분산 트레이싱 저장</text>
  <text x="466" y="308" text-anchor="middle" font-size="9" fill="#86efac">OpenTelemetry 수신</text>
  <text x="466" y="324" text-anchor="middle" font-size="9" fill="#86efac">TraceQL</text>
  <text x="466" y="340" text-anchor="middle" font-size="9" fill="#86efac">service.name 태그</text>
  <text x="466" y="356" text-anchor="middle" font-size="9" fill="#86efac">Metric → Trace</text>
  <text x="626" y="308" text-anchor="middle" font-size="9" fill="#86efac">Loki ↔ Tempo Correlation</text>
  <text x="626" y="324" text-anchor="middle" font-size="9" fill="#86efac">Log → Trace 드릴다운</text>
  <text x="626" y="340" text-anchor="middle" font-size="9" fill="#86efac">Trace → Log 버튼</text>
  <text x="626" y="356" text-anchor="middle" font-size="9" fill="#86efac">서비스 의존성 맵</text>

  <!-- ARROWS Alloy → Backends -->
  <line x1="364" y1="158" x2="394" y2="158" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrowG)"/>
  <text x="379" y="152" text-anchor="middle" font-size="8" fill="#4ade80">logs</text>

  <line x1="364" y1="243" x2="394" y2="172" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#arrowG)"/>
  <line x1="364" y1="243" x2="554" y2="172" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#arrowG)"/>
  <text x="458" y="210" text-anchor="middle" font-size="8" fill="#4ade80">metrics</text>

  <line x1="364" y1="317" x2="394" y2="317" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrowG)"/>
  <text x="379" y="311" text-anchor="middle" font-size="8" fill="#4ade80">traces</text>

  <line x1="364" y1="382" x2="554" y2="240" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#arrowG)"/>
  <text x="470" y="338" text-anchor="middle" font-size="8" fill="#4ade80">kafka lag</text>

  <!-- ========== COL 4: Grafana ========== -->
  <rect x="728" y="68" width="168" height="344" rx="10" fill="#1c0a2e" stroke="#a855f7" stroke-width="1.5" filter="url(#sh2)"/>
  <rect x="728" y="68" width="168" height="28" rx="10" fill="#7e22ce"/>
  <rect x="728" y="85" width="168" height="11" fill="#7e22ce"/>
  <text x="812" y="87" text-anchor="middle" font-size="11" font-weight="700" fill="#e9d5ff">Grafana</text>

  <rect x="740" y="110" width="144" height="58" rx="6" fill="#3b0764" stroke="#a855f7" stroke-width="1"/>
  <text x="812" y="126" text-anchor="middle" font-size="10" font-weight="700" fill="#d8b4fe">SLO 대시보드</text>
  <text x="812" y="142" text-anchor="middle" font-size="9" fill="#c4b5fd">에러율 / P99 / pod restart</text>
  <text x="812" y="157" text-anchor="middle" font-size="9" fill="#c4b5fd">장애 시뮬레이션 결과</text>

  <rect x="740" y="182" width="144" height="58" rx="6" fill="#3b0764" stroke="#a855f7" stroke-width="1"/>
  <text x="812" y="198" text-anchor="middle" font-size="10" font-weight="700" fill="#d8b4fe">Log-Trace Correlation</text>
  <text x="812" y="214" text-anchor="middle" font-size="9" fill="#c4b5fd">Loki 로그 → trace_id</text>
  <text x="812" y="229" text-anchor="middle" font-size="9" fill="#c4b5fd">→ Tempo 자동 이동</text>

  <rect x="740" y="254" width="144" height="58" rx="6" fill="#3b0764" stroke="#a855f7" stroke-width="1"/>
  <text x="812" y="270" text-anchor="middle" font-size="10" font-weight="700" fill="#d8b4fe">Metric-Trace Correlation</text>
  <text x="812" y="286" text-anchor="middle" font-size="9" fill="#c4b5fd">Prometheus Exemplar</text>
  <text x="812" y="301" text-anchor="middle" font-size="9" fill="#c4b5fd">→ Tempo 드릴다운</text>

  <rect x="740" y="326" width="144" height="58" rx="6" fill="#3b0764" stroke="#a855f7" stroke-width="1"/>
  <text x="812" y="342" text-anchor="middle" font-size="10" font-weight="700" fill="#d8b4fe">Trace Explore</text>
  <text x="812" y="358" text-anchor="middle" font-size="9" fill="#c4b5fd">TraceQL / 서비스 맵</text>
  <text x="812" y="373" text-anchor="middle" font-size="9" fill="#c4b5fd">Loki 로그 버튼 연동</text>

  <!-- ARROWS Backends → Grafana -->
  <line x1="708" y1="172" x2="727" y2="172" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arrowP)"/>
  <line x1="708" y1="172" x2="727" y2="211" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arrowP)"/>
  <line x1="708" y1="172" x2="727" y2="283" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arrowP)"/>
  <line x1="708" y1="322" x2="727" y2="355" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arrowP)"/>
  <text x="718" y="248" text-anchor="middle" font-size="8" fill="#c4b5fd">query</text>

  <!-- Legend -->
  <rect x="20" y="426" width="880" height="38" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <line x1="40" y1="445" x2="72" y2="445" stroke="#f97316" stroke-width="2"/>
  <polygon points="70,441 80,445 70,449" fill="#f97316"/>
  <text x="86" y="448" font-size="9" fill="#fed7aa">App → Alloy 수집</text>
  <line x1="190" y1="445" x2="222" y2="445" stroke="#22c55e" stroke-width="2"/>
  <polygon points="220,441 230,445 220,449" fill="#22c55e"/>
  <text x="236" y="448" font-size="9" fill="#86efac">Alloy → Backend 저장</text>
  <line x1="360" y1="445" x2="392" y2="445" stroke="#a855f7" stroke-width="2"/>
  <polygon points="390,441 400,445 390,449" fill="#a855f7"/>
  <text x="406" y="448" font-size="9" fill="#d8b4fe">Backend → Grafana 쿼리</text>
  <line x1="560" y1="445" x2="592" y2="445" stroke="#64748b" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="600" y="448" font-size="9" fill="#94a3b8">간접 경로</text>
  <text x="660" y="448" font-size="9" fill="#64748b">|  핵심: Log-Trace Correlation (Loki ↔ Tempo)  /  Metric-Trace Correlation (Exemplar → Tempo)</text>
</svg>
