<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Observability Platform — 면접 아키텍처 다이어그램</title>
  <style>
    body { margin: 0; background: #f0ede8; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    svg { filter: drop-shadow(0 4px 16px rgba(0,0,0,0.12)); }
    text { font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; }
  </style>
</head>
<body>
<svg width="960" height="680" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 680">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#555"/>
    </marker>
    <marker id="arr-green" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#2e7d32"/>
    </marker>
    <marker id="arr-red" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#c62828"/>
    </marker>
    <marker id="arr-teal" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#00695c"/>
    </marker>
    <marker id="arr-purple" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#6a1b9a"/>
    </marker>
    <marker id="arr-orange" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#e65100"/>
    </marker>
    <marker id="arr-blue" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#0d47a1"/>
    </marker>
  </defs>

  <!-- 배경 (화이트보드 느낌) -->
  <rect width="960" height="680" fill="#fffef8" rx="12"/>

  <!-- 제목 -->
  <text x="480" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a1a1a">Observability Platform — Architecture</text>

  <!-- ===================== GitOps Pipeline (상단) ===================== -->
  <!-- GitHub Actions -->
  <rect x="30" y="58" width="160" height="46" rx="7" fill="#fff8f0" stroke="#e65100" stroke-width="1.8"/>
  <text x="110" y="77" text-anchor="middle" font-size="12" font-weight="bold" fill="#bf360c">GitHub Actions</text>
  <text x="110" y="94" text-anchor="middle" font-size="10" fill="#bf360c">빌드 / GHCR push</text>

  <!-- 화살표 -->
  <line x1="190" y1="81" x2="240" y2="81" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="215" y="73" text-anchor="middle" font-size="9" fill="#777">infra/ 태그 업데이트</text>

  <!-- ArgoCD -->
  <rect x="240" y="58" width="140" height="46" rx="7" fill="#f1f8e9" stroke="#2e7d32" stroke-width="1.8"/>
  <text x="310" y="77" text-anchor="middle" font-size="13" font-weight="bold" fill="#1b5e20">ArgoCD</text>
  <text x="310" y="94" text-anchor="middle" font-size="10" fill="#1b5e20">GitOps 자동 sync</text>

  <!-- ArgoCD → K8s 화살표 (아래로) -->
  <line x1="310" y1="104" x2="310" y2="128" stroke="#2e7d32" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#arr-green)"/>

  <!-- Sealed Secrets 설명 (우측 상단) -->
  <rect x="650" y="58" width="155" height="46" rx="7" fill="#fce4ec" stroke="#880e4f" stroke-width="1.4" stroke-dasharray="5,3"/>
  <text x="727" y="77" text-anchor="middle" font-size="11" font-weight="bold" fill="#880e4f">Sealed Secrets</text>
  <text x="727" y="94" text-anchor="middle" font-size="10" fill="#880e4f">Git 기반 Secret 관리</text>

  <!-- ===================== Kubernetes Cluster 큰 박스 ===================== -->
  <rect x="20" y="128" width="920" height="530" rx="12" fill="#f5f9ff" stroke="#1565c0" stroke-width="2.2"/>
  <text x="50" y="152" font-size="13" font-weight="bold" fill="#1565c0">☸  Kubernetes Cluster  (kubeadm · 싱글 노드)</text>

  <!-- ===================== 레이어 1: 샘플 앱 ===================== -->
  <text x="480" y="178" text-anchor="middle" font-size="11" fill="#888">— 샘플 MSA 서비스 (Observability 관측 대상) —</text>

  <!-- order-service -->
  <rect x="60" y="186" width="200" height="52" rx="7" fill="#fffde7" stroke="#f9a825" stroke-width="1.8"/>
  <text x="160" y="207" text-anchor="middle" font-size="12" font-weight="bold" fill="#e65100">order-service</text>
  <text x="160" y="226" text-anchor="middle" font-size="10" fill="#e65100">Spring Boot · Micrometer · OTel</text>

  <!-- payment-service -->
  <rect x="380" y="186" width="200" height="52" rx="7" fill="#fffde7" stroke="#f9a825" stroke-width="1.8"/>
  <text x="480" y="207" text-anchor="middle" font-size="12" font-weight="bold" fill="#e65100">payment-service</text>
  <text x="480" y="226" text-anchor="middle" font-size="10" fill="#e65100">Spring Boot · Micrometer · OTel</text>

  <!-- notification-service -->
  <rect x="700" y="186" width="200" height="52" rx="7" fill="#fffde7" stroke="#f9a825" stroke-width="1.8"/>
  <text x="800" y="207" text-anchor="middle" font-size="12" font-weight="bold" fill="#e65100">notification-service</text>
  <text x="800" y="226" text-anchor="middle" font-size="10" fill="#e65100">Spring Boot · Micrometer · OTel</text>

  <!-- 화살표: 3가지 시그널 (order) -->
  <line x1="110" y1="238" x2="110" y2="306" stroke="#c62828" stroke-width="1.6" marker-end="url(#arr-red)"/>
  <line x1="160" y1="238" x2="160" y2="306" stroke="#00695c" stroke-width="1.6" marker-end="url(#arr-teal)"/>
  <line x1="210" y1="238" x2="210" y2="306" stroke="#6a1b9a" stroke-width="1.6" marker-end="url(#arr-purple)"/>

  <!-- 화살표: 3가지 시그널 (payment) -->
  <line x1="430" y1="238" x2="430" y2="306" stroke="#c62828" stroke-width="1.6" marker-end="url(#arr-red)"/>
  <line x1="480" y1="238" x2="480" y2="306" stroke="#00695c" stroke-width="1.6" marker-end="url(#arr-teal)"/>
  <line x1="530" y1="238" x2="530" y2="306" stroke="#6a1b9a" stroke-width="1.6" marker-end="url(#arr-purple)"/>

  <!-- 화살표: 3가지 시그널 (notification) -->
  <line x1="750" y1="238" x2="750" y2="306" stroke="#c62828" stroke-width="1.6" marker-end="url(#arr-red)"/>
  <line x1="800" y1="238" x2="800" y2="306" stroke="#00695c" stroke-width="1.6" marker-end="url(#arr-teal)"/>
  <line x1="850" y1="238" x2="850" y2="306" stroke="#6a1b9a" stroke-width="1.6" marker-end="url(#arr-purple)"/>

  <!-- 범례 (신호 색상) -->
  <line x1="565" y1="260" x2="580" y2="260" stroke="#c62828" stroke-width="2"/>
  <text x="585" y="264" font-size="10" fill="#c62828">metrics</text>
  <line x1="625" y1="260" x2="640" y2="260" stroke="#00695c" stroke-width="2"/>
  <text x="645" y="264" font-size="10" fill="#00695c">logs</text>
  <line x1="678" y1="260" x2="693" y2="260" stroke="#6a1b9a" stroke-width="2"/>
  <text x="698" y="264" font-size="10" fill="#6a1b9a">traces</text>

  <!-- ===================== 레이어 2: Observability 스택 ===================== -->
  <!-- Prometheus -->
  <rect x="45" y="306" width="220" height="68" rx="8" fill="#ffebee" stroke="#c62828" stroke-width="1.8"/>
  <text x="155" y="330" text-anchor="middle" font-size="14" font-weight="bold" fill="#b71c1c">Prometheus</text>
  <text x="155" y="348" text-anchor="middle" font-size="10" fill="#b71c1c">메트릭 수집 · 저장</text>
  <text x="155" y="364" text-anchor="middle" font-size="9" fill="#b71c1c">+ Custom Exporter (Kafka Consumer Lag)</text>

  <!-- Loki (with Alloy) -->
  <rect x="370" y="306" width="220" height="68" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.8"/>
  <text x="480" y="330" text-anchor="middle" font-size="14" font-weight="bold" fill="#1b5e20">Alloy → Loki</text>
  <text x="480" y="348" text-anchor="middle" font-size="10" fill="#1b5e20">로그 수집 · 저장</text>
  <text x="480" y="364" text-anchor="middle" font-size="9" fill="#1b5e20">라벨 기반 인덱싱 (경량)</text>

  <!-- Tempo (with OTel) -->
  <rect x="695" y="306" width="220" height="68" rx="8" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1.8"/>
  <text x="805" y="330" text-anchor="middle" font-size="14" font-weight="bold" fill="#4a148c">OTel → Tempo</text>
  <text x="805" y="348" text-anchor="middle" font-size="10" fill="#4a148c">트레이스 수집 · 저장</text>
  <text x="805" y="364" text-anchor="middle" font-size="9" fill="#4a148c">분산 트레이싱</text>

  <!-- ===================== Correlation 화살표 ===================== -->
  <!-- Log-Trace Correlation: Loki ↔ Tempo (점선 호) -->
  <path d="M590 345 C640 395 700 395 695 345" fill="none" stroke="#e65100" stroke-width="1.8" stroke-dasharray="6,3" marker-end="url(#arr-orange)"/>
  <text x="645" y="408" text-anchor="middle" font-size="10" font-weight="bold" fill="#e65100">Log-Trace Correlation</text>
  <text x="645" y="421" text-anchor="middle" font-size="9" fill="#e65100">(Loki trace_id → Tempo)</text>

  <!-- Metric-Trace Correlation: Prometheus → Tempo (넓은 호) -->
  <path d="M265 338 C480 450 660 450 695 338" fill="none" stroke="#0d47a1" stroke-width="1.8" stroke-dasharray="6,3" marker-end="url(#arr-blue)"/>
  <text x="480" y="465" text-anchor="middle" font-size="10" font-weight="bold" fill="#0d47a1">Metric-Trace Correlation  (Exemplar → Tempo)</text>

  <!-- ===================== 레이어 3: Grafana ===================== -->
  <!-- 화살표 → Grafana -->
  <line x1="155" y1="374" x2="400" y2="498" stroke="#c62828" stroke-width="1.5" marker-end="url(#arr-red)"/>
  <line x1="480" y1="374" x2="480" y2="498" stroke="#2e7d32" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <line x1="805" y1="374" x2="565" y2="498" stroke="#6a1b9a" stroke-width="1.5" marker-end="url(#arr-purple)"/>

  <!-- Grafana 박스 -->
  <rect x="330" y="498" width="300" height="72" rx="10" fill="#e3f2fd" stroke="#1565c0" stroke-width="2.2"/>
  <text x="480" y="525" text-anchor="middle" font-size="16" font-weight="bold" fill="#0d47a1">Grafana</text>
  <text x="480" y="545" text-anchor="middle" font-size="11" fill="#0d47a1">메트릭 / 로그 / 트레이스 통합 대시보드</text>
  <text x="480" y="561" text-anchor="middle" font-size="10" fill="#0d47a1">SLO 현황 · JVM 분석 · 3신호 Correlation</text>

  <!-- ===================== 하단 노트 ===================== -->
  <text x="480" y="620" text-anchor="middle" font-size="10" fill="#aaa">* 모든 인프라 변경은 infra/ → Git push → ArgoCD sync 경로로만 반영 (SSA 정책)</text>

</svg>
</body>
</html>
