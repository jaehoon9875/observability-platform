<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 520" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrow-p" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a855f7"/>
    </marker>
    <filter id="sh" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000025"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="860" height="520" fill="#0f172a" rx="12"/>

  <!-- Title -->
  <text x="430" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#f1f5f9">전체 아키텍처 다이어그램</text>
  <text x="430" y="56" text-anchor="middle" font-size="12" fill="#64748b">cloud-sre-platform → observability-platform → sample-apps</text>

  <!-- ===== LAYER 1: cloud-sre-platform ===== -->
  <rect x="30" y="74" width="800" height="134" rx="10" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="30" y="74" width="800" height="30" rx="10" fill="#1d4ed8"/>
  <rect x="30" y="93" width="800" height="11" fill="#1d4ed8"/>
  <text x="52" y="94" font-size="11" font-weight="700" fill="#bfdbfe">Layer 1</text>
  <text x="110" y="94" font-size="11" font-weight="600" fill="#ffffff">cloud-sre-platform</text>
  <text x="430" y="94" text-anchor="middle" font-size="10" fill="#93c5fd">GCP 인프라 + GitOps 플랫폼 (GKE Standard / Spot Node Pool / Terraform)</text>

  <!-- GKE -->
  <rect x="50" y="114" width="170" height="80" rx="7" fill="#172554" stroke="#3b82f6" stroke-width="1"/>
  <text x="135" y="133" text-anchor="middle" font-size="11" font-weight="700" fill="#93c5fd">☁ GKE Standard</text>
  <text x="135" y="151" text-anchor="middle" font-size="10" fill="#93c5fd">Spot Node Pool</text>
  <text x="135" y="167" text-anchor="middle" font-size="10" fill="#93c5fd">GCP asia-northeast3</text>
  <text x="135" y="183" text-anchor="middle" font-size="10" fill="#93c5fd">Terraform 프로비저닝</text>

  <!-- ArgoCD -->
  <rect x="240" y="114" width="170" height="80" rx="7" fill="#172554" stroke="#3b82f6" stroke-width="1"/>
  <text x="325" y="133" text-anchor="middle" font-size="11" font-weight="700" fill="#93c5fd">🔄 ArgoCD</text>
  <text x="325" y="151" text-anchor="middle" font-size="10" fill="#93c5fd">GitOps CD</text>
  <text x="325" y="167" text-anchor="middle" font-size="10" fill="#93c5fd">Git → 클러스터 자동 동기화</text>
  <text x="325" y="183" text-anchor="middle" font-size="10" fill="#93c5fd">Helm 기반 배포</text>

  <!-- GitHub Actions -->
  <rect x="430" y="114" width="170" height="80" rx="7" fill="#172554" stroke="#3b82f6" stroke-width="1"/>
  <text x="515" y="133" text-anchor="middle" font-size="11" font-weight="700" fill="#93c5fd">⚙ GitHub Actions</text>
  <text x="515" y="151" text-anchor="middle" font-size="10" fill="#93c5fd">CI Pipeline</text>
  <text x="515" y="167" text-anchor="middle" font-size="10" fill="#93c5fd">빌드 / 이미지 푸시</text>
  <text x="515" y="183" text-anchor="middle" font-size="10" fill="#93c5fd">ArgoCD 자동 sync</text>

  <!-- Sealed Secrets -->
  <rect x="620" y="114" width="188" height="80" rx="7" fill="#172554" stroke="#3b82f6" stroke-width="1"/>
  <text x="714" y="133" text-anchor="middle" font-size="11" font-weight="700" fill="#93c5fd">🔐 Sealed Secrets</text>
  <text x="714" y="151" text-anchor="middle" font-size="10" fill="#93c5fd">kubeseal 암호화</text>
  <text x="714" y="167" text-anchor="middle" font-size="10" fill="#93c5fd">Secret → Git 관리</text>
  <text x="714" y="183" text-anchor="middle" font-size="10" fill="#93c5fd">GitOps 원칙 준수</text>

  <!-- Arrow 1→2 -->
  <line x1="430" y1="208" x2="430" y2="232" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" stroke-dasharray="5,3"/>
  <text x="450" y="224" font-size="10" fill="#64748b">배포</text>

  <!-- ===== LAYER 2: observability-platform ===== -->
  <rect x="30" y="234" width="800" height="140" rx="10" fill="#1a2e1a" stroke="#22c55e" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="30" y="234" width="800" height="30" rx="10" fill="#15803d"/>
  <rect x="30" y="253" width="800" height="11" fill="#15803d"/>
  <text x="52" y="254" font-size="11" font-weight="700" fill="#bbf7d0">Layer 2</text>
  <text x="110" y="254" font-size="11" font-weight="600" fill="#ffffff">observability-platform</text>
  <text x="430" y="254" text-anchor="middle" font-size="10" fill="#86efac">Kubernetes 기반 모니터링 스택 (온프레미스 싱글노드 / kubeadm)</text>

  <!-- Prometheus -->
  <rect x="50" y="274" width="140" height="86" rx="7" fill="#052e16" stroke="#22c55e" stroke-width="1"/>
  <text x="120" y="293" text-anchor="middle" font-size="11" font-weight="700" fill="#86efac">📊 Prometheus</text>
  <text x="120" y="310" text-anchor="middle" font-size="10" fill="#86efac">메트릭 수집 / 저장</text>
  <text x="120" y="326" text-anchor="middle" font-size="10" fill="#86efac">SLO Alert Rules</text>
  <text x="120" y="342" text-anchor="middle" font-size="10" fill="#86efac">Custom Exporter</text>

  <!-- Grafana -->
  <rect x="210" y="274" width="140" height="86" rx="7" fill="#052e16" stroke="#22c55e" stroke-width="1"/>
  <text x="280" y="293" text-anchor="middle" font-size="11" font-weight="700" fill="#86efac">📈 Grafana</text>
  <text x="280" y="310" text-anchor="middle" font-size="10" fill="#86efac">시각화 / 대시보드</text>
  <text x="280" y="326" text-anchor="middle" font-size="10" fill="#86efac">Log-Trace Correlation</text>
  <text x="280" y="342" text-anchor="middle" font-size="10" fill="#86efac">Metric-Trace Correlation</text>

  <!-- Loki -->
  <rect x="370" y="274" width="140" height="86" rx="7" fill="#052e16" stroke="#22c55e" stroke-width="1"/>
  <text x="440" y="293" text-anchor="middle" font-size="11" font-weight="700" fill="#86efac">📝 Loki</text>
  <text x="440" y="310" text-anchor="middle" font-size="10" fill="#86efac">로그 수집 / 저장</text>
  <text x="440" y="326" text-anchor="middle" font-size="10" fill="#86efac">라벨 기반 인덱싱</text>
  <text x="440" y="342" text-anchor="middle" font-size="10" fill="#86efac">Alloy 수집 에이전트</text>

  <!-- Tempo -->
  <rect x="530" y="274" width="140" height="86" rx="7" fill="#052e16" stroke="#22c55e" stroke-width="1"/>
  <text x="600" y="293" text-anchor="middle" font-size="11" font-weight="700" fill="#86efac">🔍 Tempo</text>
  <text x="600" y="310" text-anchor="middle" font-size="10" fill="#86efac">분산 트레이싱</text>
  <text x="600" y="326" text-anchor="middle" font-size="10" fill="#86efac">OpenTelemetry</text>
  <text x="600" y="342" text-anchor="middle" font-size="10" fill="#86efac">Loki ↔ Tempo 연동</text>

  <!-- Kafka -->
  <rect x="690" y="274" width="122" height="86" rx="7" fill="#052e16" stroke="#22c55e" stroke-width="1"/>
  <text x="751" y="293" text-anchor="middle" font-size="11" font-weight="700" fill="#86efac">📨 Kafka</text>
  <text x="751" y="310" text-anchor="middle" font-size="10" fill="#86efac">Strimzi Operator</text>
  <text x="751" y="326" text-anchor="middle" font-size="10" fill="#86efac">비동기 메시지 버스</text>
  <text x="751" y="342" text-anchor="middle" font-size="10" fill="#86efac">Kafka Lag 모니터링</text>

  <!-- Arrow 2→3 -->
  <line x1="430" y1="374" x2="430" y2="398" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" stroke-dasharray="5,3"/>
  <text x="450" y="390" font-size="10" fill="#64748b">모니터링</text>

  <!-- ===== LAYER 3: sample-apps ===== -->
  <rect x="30" y="400" width="800" height="104" rx="10" fill="#2a1a2e" stroke="#a855f7" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="30" y="400" width="800" height="30" rx="10" fill="#7e22ce"/>
  <rect x="30" y="419" width="800" height="11" fill="#7e22ce"/>
  <text x="52" y="420" font-size="11" font-weight="700" fill="#e9d5ff">Layer 3</text>
  <text x="110" y="420" font-size="11" font-weight="600" fill="#ffffff">sample-apps</text>
  <text x="430" y="420" text-anchor="middle" font-size="10" fill="#d8b4fe">Java Spring Boot 기반 MSA 서비스 — 모니터링 대상</text>

  <!-- order -->
  <rect x="68" y="438" width="218" height="54" rx="7" fill="#3b0764" stroke="#a855f7" stroke-width="1"/>
  <text x="177" y="456" text-anchor="middle" font-size="11" font-weight="700" fill="#d8b4fe">🛒 order-service</text>
  <text x="177" y="472" text-anchor="middle" font-size="10" fill="#c4b5fd">진입점 — REST 호출 + Kafka 발행</text>
  <text x="177" y="486" text-anchor="middle" font-size="10" fill="#c4b5fd">SLO: 가용성 99.9% / P99 500ms</text>

  <!-- payment -->
  <rect x="320" y="438" width="218" height="54" rx="7" fill="#3b0764" stroke="#a855f7" stroke-width="1"/>
  <text x="429" y="456" text-anchor="middle" font-size="11" font-weight="700" fill="#d8b4fe">💳 payment-service</text>
  <text x="429" y="472" text-anchor="middle" font-size="10" fill="#c4b5fd">동기 결제 처리 (REST)</text>
  <text x="429" y="486" text-anchor="middle" font-size="10" fill="#c4b5fd">SLO: 호출 실패율 5% 미만</text>

  <!-- notification -->
  <rect x="572" y="438" width="218" height="54" rx="7" fill="#3b0764" stroke="#a855f7" stroke-width="1"/>
  <text x="681" y="456" text-anchor="middle" font-size="11" font-weight="700" fill="#d8b4fe">🔔 notification-service</text>
  <text x="681" y="472" text-anchor="middle" font-size="10" fill="#c4b5fd">Kafka Consumer (비동기)</text>
  <text x="681" y="486" text-anchor="middle" font-size="10" fill="#c4b5fd">주문 이벤트 → 알림 처리</text>

  <!-- Service arrows -->
  <line x1="286" y1="465" x2="318" y2="465" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arrow-p)"/>
  <text x="302" y="459" text-anchor="middle" font-size="9" fill="#c4b5fd">REST</text>
  <line x1="538" y1="465" x2="570" y2="465" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arrow-p)"/>
  <text x="554" y="459" text-anchor="middle" font-size="9" fill="#c4b5fd">Kafka</text>
</svg>
