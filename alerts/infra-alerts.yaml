apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: infra-alerts
  namespace: monitoring
  labels:
    release: my-kube-prometheus-stack
spec:
  groups:
    - name: infra.pod
      rules:
        # Pod가 반복적으로 재시작되면 알림 (CrashLoopBackOff 감지)
        - alert: PodCrashLooping
          expr: |
            rate(kube_pod_container_status_restarts_total{namespace="observability-platform"}[15m]) * 60 * 15 > 1
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Pod {{ $labels.pod }} CrashLoop 감지"
            description: "namespace={{ $labels.namespace }} pod={{ $labels.pod }} 가 최근 15분간 반복 재시작 중입니다."

        # Pod가 Ready 상태가 아닌 상태로 5분 이상 유지되면 알림
        - alert: PodNotReady
          expr: |
            kube_pod_status_ready{namespace="observability-platform", condition="true"} == 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.pod }} Not Ready"
            description: "namespace={{ $labels.namespace }} pod={{ $labels.pod }} 가 5분 이상 Ready 상태가 아닙니다."

    - name: infra.resource
      rules:
        # 컨테이너 메모리 사용량이 limit의 90%를 초과하면 알림
        - alert: ContainerHighMemoryUsage
          expr: |
            container_memory_working_set_bytes{namespace="observability-platform", container!=""}
            /
            container_spec_memory_limit_bytes{namespace="observability-platform", container!=""}
            > 0.9
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "컨테이너 {{ $labels.container }} 메모리 사용량 경고"
            description: "pod={{ $labels.pod }} container={{ $labels.container }} 메모리 사용량이 limit의 {{ $value | humanizePercentage }} 입니다."

        # 컨테이너 CPU 사용량이 limit의 90%를 초과하면 알림
        - alert: ContainerHighCpuUsage
          expr: |
            rate(container_cpu_usage_seconds_total{namespace="observability-platform", container!=""}[5m])
            /
            container_spec_cpu_quota{namespace="observability-platform", container!=""} * container_spec_cpu_period{namespace="observability-platform", container!=""}
            > 0.9
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "컨테이너 {{ $labels.container }} CPU 사용량 경고"
            description: "pod={{ $labels.pod }} container={{ $labels.container }} CPU 사용량이 limit의 {{ $value | humanizePercentage }} 입니다."

    - name: test
      rules:
        # [테스트 전용] Alert Rule 동작 확인용 — 항상 즉시 Firing 상태가 된다.
        # vector(1) > 0 은 항상 참인 조건이며, for: 0m 으로 대기 시간 없이 바로 발동된다.
        # 확인 완료 후 이 룰은 삭제하거나 주석 처리한다.
        #
        # 적용 명령어:
        #   kubectl apply -f alerts/infra-alerts.yaml
        # 확인 방법:
        #   Prometheus UI → Alerts 탭 → "AlwaysFiringTest" 가 Firing 상태인지 확인
        - alert: AlwaysFiringTest
          expr: vector(1) > 0
          for: 0m
          labels:
            severity: info
          annotations:
            summary: "[테스트] Alert Rule 동작 확인용"
            description: "이 Alert는 테스트 목적으로 항상 Firing 상태입니다. 확인 후 삭제하세요."
