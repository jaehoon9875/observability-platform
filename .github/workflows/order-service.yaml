name: CI - order-service

on:
  push:
    branches: [ main ]
    paths:
      - 'sample-apps/order-service/**'

# GITHUB_TOKEN에 GHCR push + 커밋 push 권한을 부여한다.
# 리포 전체 설정(Read-only)을 바꾸지 않고 이 Workflow 범위에서만 권한을 확장한다.
permissions:
  contents: write  # deployment.yaml 수정 커밋용
  packages: write  # GHCR 이미지 push용

env:
  IMAGE: ghcr.io/jaehoon9875/order-service

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: JDK 17 설정
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: 단위 테스트
        working-directory: sample-apps/order-service
        run: ./mvnw test

      - name: GHCR 로그인
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Buildx 설정 (멀티플랫폼 빌드용)
        uses: docker/setup-buildx-action@v3

      # linux/amd64: 클러스터(배포 대상), linux/arm64: 개발 MacBook M1
      - name: 이미지 빌드 및 GHCR push
        uses: docker/build-push-action@v6
        with:
          context: sample-apps/order-service
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:sha-${{ github.sha }}
            ${{ env.IMAGE }}:latest
          # GitHub Actions 캐시로 빌드 속도를 개선한다.
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ArgoCD가 이미지 변경을 감지하려면 deployment.yaml의 태그가 바뀌어야 한다.
      # :latest는 내용이 같아도 태그가 동일해 ArgoCD가 변경으로 인식하지 못한다.
      - name: deployment.yaml 이미지 태그 업데이트
        run: |
          sed -i "s|image: ${{ env.IMAGE }}:.*|image: ${{ env.IMAGE }}:sha-${{ github.sha }}|g" \
            infra/manifests/sample-apps/order-service/deployment.yaml

      # 변경된 deployment.yaml을 main에 직접 push한다.
      # 이 커밋은 paths 필터('sample-apps/order-service/**')에 해당하지 않으므로
      # Workflow가 다시 트리거되지 않는다. (무한 루프 없음)
      - name: 변경 내용 커밋 및 push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add infra/manifests/sample-apps/order-service/deployment.yaml
          git commit -m "ci: order-service 이미지 태그 업데이트 (sha-${{ github.sha }})"
          git pull --rebase origin main
          git push
