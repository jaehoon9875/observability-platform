# prometheus-community/kube-prometheus-stack 커스텀 설정
# chart version: 82.14.0 / app version: v0.89.0
# release name: my-kube-prometheus-stack
# 현재 클러스터는 모두 기본값으로 설치됨

# Grafana 추가 데이터소스 (Loki, Tempo 연동)
grafana:
  # PV 마운트 시 kubelet이 자동으로 fsGroup 소유권을 변경해주므로
  # initChownData(initContainer 방식) 없이도 최초 기동부터 권한 문제가 없다.
  # initChownData: false로 비활성화하면 신규 PV에서 Permission denied 발생 가능.
  securityContext:
    runAsUser: 472
    runAsGroup: 472
    fsGroup: 472  # kubelet이 볼륨 마운트 시 GID 472로 소유권을 자동 변경
  initChownData:
    enabled: true  # 기본값 명시 — fsGroup과 중복이지만 안전망으로 유지
  persistence:
    enabled: true
    size: 2Gi
  deleteDatasources:
    - name: Tempo
      orgId: 1
  additionalDataSources:
    - name: Loki
      type: loki
      uid: loki
      url: http://loki.monitoring:3100
      access: proxy
      jsonData:
        httpHeaderName1: "X-Scope-OrgID"
        # Loki 라벨 trace_id → Tempo 링크 생성 (Log-Trace Correlation)
        derivedFields:
          - name: TraceID
            matcherType: regex
            matcherRegex: '"trace_id":"([a-f0-9]{32})"'
            url: "${__value.raw}"
            datasourceUid: tempo
            urlDisplayLabel: "Tempo에서 트레이스 보기"
      secureJsonData:
        httpHeaderValue1: "fake"
    - name: Tempo
      type: tempo
      uid: tempo
      url: http://tempo.monitoring:3200
      access: proxy
      jsonData:
        tracesToLogsV2:
          datasourceUid: loki
          filterByTraceID: true
          filterBySpanID: false
          tags:
            - key: service.name
              value: app
            - key: k8s.namespace.name
              value: namespace
        lokiSearch:
          datasourceUid: loki
