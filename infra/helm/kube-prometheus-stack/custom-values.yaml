# prometheus-community/kube-prometheus-stack 커스텀 설정
# chart version: 82.14.0 / app version: v0.89.0
# release name: my-kube-prometheus-stack
# 현재 클러스터는 모두 기본값으로 설치됨

prometheus:
  prometheusSpec:
    # Exemplar 저장소 활성화 — 메트릭에 붙은 trace_id를 Prometheus가 보존
    enableFeatures:
      - exemplar-storage

# Grafana 추가 데이터소스 (Loki, Tempo 연동)
grafana:
  # admin 비밀번호는 SealedSecret(grafana-admin-secret)으로 관리
  # 비밀번호 변경 시 docs/sealed-secrets-setup.md 참조
  admin:
    existingSecret: grafana-admin-secret
    userKey: admin-user
    passwordKey: admin-password
  # fsGroup: 472로 kubelet이 볼륨 마운트 시 GID 소유권을 자동 변경하므로
  # init-chown-data 컨테이너는 불필요. 또한 init 컨테이너는 CAP_CHOWN만 보유하여
  # DAC_OVERRIDE 없이 mode 700 디렉토리(pdf/csv/png)를 재귀 탐색 불가 → Permission denied.
  securityContext:
    fsGroup: 472  # kubelet이 볼륨 마운트 시 GID 472로 소유권을 자동 변경
  initChownData:
    enabled: false  # fsGroup으로 처리하므로 init container 불필요
  persistence:
    enabled: true
    size: 2Gi
  sidecar:
    datasources:
      # kube-prometheus-stack이 자동 생성하는 Prometheus 데이터소스에
      # exemplar → Tempo 연결 설정 추가
      exemplarTraceIdDestinations:
        datasourceUid: tempo
        traceIdLabelName: trace_id
  deleteDatasources:
    - name: Tempo
      orgId: 1
    - name: Loki
      orgId: 1
  additionalDataSources:
    - name: Loki
      type: loki
      uid: loki
      url: http://loki.monitoring:3100
      access: proxy
      jsonData:
        httpHeaderName1: "X-Scope-OrgID"
        # Loki 라벨 trace_id → Tempo 링크 생성 (Log-Trace Correlation)
        derivedFields:
          - name: TraceID
            matcherType: regex
            matcherRegex: '"trace_id":"([a-f0-9]{32})"'
            url: "$${__value.raw}"
            datasourceUid: tempo
            urlDisplayLabel: "View trace in Tempo"
      secureJsonData:
        httpHeaderValue1: "fake"
    - name: Tempo
      type: tempo
      uid: tempo
      url: http://tempo.monitoring:3200
      access: proxy
      jsonData:
        tracesToLogsV2:
          datasourceUid: loki
          filterByTraceID: false
          filterBySpanID: false
          customQuery: true
          query: '{app="$${__tags.app}"} | json | trace_id="$${__trace.traceId}"'
          tags:
            - key: service.name
              value: app
        lokiSearch:
          datasourceUid: loki
