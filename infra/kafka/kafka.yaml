apiVersion: v1
kind: Service
metadata:
  # 클러스터 내부 접근용 — configmap의 KAFKA_BOOTSTRAP_SERVERS: "kafka:9092" 와 일치
  name: kafka
  namespace: observability-platform
  labels:
    app.kubernetes.io/name: kafka
    app.kubernetes.io/part-of: observability-platform
spec:
  selector:
    app: kafka
  ports:
    - name: broker
      port: 9092
      targetPort: 9092
---
apiVersion: v1
kind: Service
metadata:
  # StatefulSet 파드 내부 통신용 (헤드리스) — KRaft controller 쿼럼 주소에 사용
  name: kafka-headless
  namespace: observability-platform
  labels:
    app.kubernetes.io/name: kafka
    app.kubernetes.io/part-of: observability-platform
spec:
  selector:
    app: kafka
  ports:
    - name: broker
      port: 9092
    - name: controller
      port: 9093
  clusterIP: None
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  namespace: observability-platform
  labels:
    app.kubernetes.io/name: kafka
    app.kubernetes.io/part-of: observability-platform
spec:
  serviceName: kafka-headless
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
        app.kubernetes.io/name: kafka
        app.kubernetes.io/part-of: observability-platform
    spec:
      containers:
        - name: kafka
          image: apache/kafka:3.9.0
          env:
            # KRaft 노드 ID
            - name: KAFKA_NODE_ID
              value: "1"
            # 이 노드는 broker + controller 역할을 동시에 수행 (싱글노드 KRaft)
            - name: KAFKA_PROCESS_ROLES
              value: "broker,controller"
            # 브로커(9092) 및 컨트롤러(9093) 리스너
            - name: KAFKA_LISTENERS
              value: "PLAINTEXT://:9092,CONTROLLER://:9093"
            # 클라이언트가 접속하는 주소 — kafka 서비스명 사용
            - name: KAFKA_ADVERTISED_LISTENERS
              value: "PLAINTEXT://kafka.observability-platform.svc.cluster.local:9092"
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT"
            - name: KAFKA_CONTROLLER_LISTENER_NAMES
              value: "CONTROLLER"
            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: "PLAINTEXT"
            # 싱글노드 KRaft 쿼럼 — 자기 자신만 참여
            - name: KAFKA_CONTROLLER_QUORUM_VOTERS
              value: "1@kafka-0.kafka-headless.observability-platform.svc.cluster.local:9093"
            # 싱글노드이므로 replication factor는 1
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
              value: "1"
            - name: KAFKA_LOG_DIRS
              value: "/var/lib/kafka/data"
          ports:
            - containerPort: 9092
            - containerPort: 9093
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          volumeMounts:
            - name: kafka-data
              mountPath: /var/lib/kafka/data
  volumeClaimTemplates:
    - metadata:
        name: kafka-data
        labels:
          app.kubernetes.io/name: kafka
          app.kubernetes.io/part-of: observability-platform
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 5Gi
