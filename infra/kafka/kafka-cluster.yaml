# Strimzi KRaft 모드 Kafka 클러스터 (싱글노드 테스트 환경)
# KafkaNodePool: controller + broker 역할을 단일 노드에서 수행
apiVersion: kafka.strimzi.io/v1
kind: KafkaNodePool
metadata:
  name: controller
  namespace: observability-platform
  labels:
    strimzi.io/cluster: kafka
    app.kubernetes.io/name: kafka
    app.kubernetes.io/part-of: observability-platform
spec:
  replicas: 1
  # 싱글노드 환경: controller와 broker 역할을 하나의 파드에서 담당
  roles:
    - controller
    - broker
  storage:
    type: persistent-claim
    size: 5Gi
    deleteClaim: false
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi
---
# Kafka 클러스터 정의
# 생성되는 부트스트랩 서비스: kafka-kafka-bootstrap:9092
apiVersion: kafka.strimzi.io/v1
kind: Kafka
metadata:
  name: kafka
  namespace: observability-platform
  labels:
    app.kubernetes.io/name: kafka
    app.kubernetes.io/part-of: observability-platform
  annotations:
    # KRaft 모드 활성화 (ZooKeeper 불필요)
    strimzi.io/node-pools: enabled
    strimzi.io/kraft: enabled
spec:
  kafka:
    version: 4.1.0
    metadataVersion: 4.1-IV0   # KRaft 메타데이터 버전 (Kafka 버전에 맞게 설정)
    listeners:
      # 클러스터 내부 평문 통신 (TLS 없음 — 테스트 환경)
      - name: plain
        port: 9092
        type: internal
        tls: false
      # TLS 리스너 — entity-operator(topic/user operator)가 Kafka에 연결할 때 사용
      - name: tls
        port: 9093
        type: internal
        tls: true
    config:
      # 싱글노드이므로 replication factor는 모두 1
      offsets.topic.replication.factor: 1
      transaction.state.log.replication.factor: 1
      transaction.state.log.min.isr: 1
      default.replication.factor: 1
      min.insync.replicas: 1
  entityOperator:
    # Topic 관리용 operator (KafkaUser 리소스 미사용으로 userOperator 제거)
    # userOperator: Strimzi 0.51.0에서 SSL 설정 누락 버그로 CrashLoopBackOff 발생 확인
    # KafkaUser 리소스 사용 시점에 재활성화 필요
    topicOperator:
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: 200m
          memory: 256Mi
