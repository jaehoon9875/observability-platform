apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-pvc
  namespace: observability-platform
  labels:
    app.kubernetes.io/name: mysql
    app.kubernetes.io/part-of: observability-platform
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 8Gi
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: observability-platform
  labels:
    app.kubernetes.io/name: mysql
    app.kubernetes.io/part-of: observability-platform
spec:
  selector:
    app: mysql
  ports:
    - port: 3306
      targetPort: 3306
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: observability-platform
  labels:
    app.kubernetes.io/name: mysql
    app.kubernetes.io/part-of: observability-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
        app.kubernetes.io/name: mysql
        app.kubernetes.io/part-of: observability-platform
    spec:
      containers:
        - name: mysql
          image: mysql:8.4
          env:
            # DB 루트 비밀번호 — order-service-secret의 DB_PASSWORD와 일치
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: order-service-secret
                  key: DB_PASSWORD
            # 애플리케이션이 사용할 초기 데이터베이스
            - name: MYSQL_DATABASE
              value: orderdb
          ports:
            - containerPort: 3306
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
      volumes:
        - name: mysql-data
          persistentVolumeClaim:
            claimName: mysql-pvc
