apiVersion: v1
kind: Service
metadata:
  name: kafka-lag-exporter
  namespace: obs-apps
  labels:
    # ServiceMonitor의 matchLabels와 반드시 일치해야 Prometheus 스크랩 대상으로 인식됨
    app: kafka-lag-exporter
    app.kubernetes.io/name: kafka-lag-exporter
    app.kubernetes.io/part-of: observability-platform
spec:
  selector:
    app: kafka-lag-exporter
  ports:
    - name: http
      port: 8080
      targetPort: 8080
