# Grafana admin 비밀번호를 SealedSecret으로 관리
#
# 이 파일은 kubeseal로 생성해야 합니다.
# sealed-secrets 컨트롤러 설치 후 아래 명령으로 재생성하세요:
#
#   kubectl create secret generic grafana-admin-secret \
#     -n monitoring \
#     --from-literal=admin-user=admin \
#     --from-literal=admin-password='rhdid12!@' \
#     --dry-run=client -o yaml \
#   | kubeseal \
#     --controller-namespace kube-system \
#     --controller-name sealed-secrets \
#     --format yaml \
#   > infra/manifests/monitoring-secrets/grafana-admin-sealedsecret.yaml
#
# 자세한 절차: docs/sealed-secrets-setup.md 참조
#
# TODO: 아래 내용을 kubeseal 출력 결과로 교체하세요
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: grafana-admin-secret
  namespace: monitoring
  annotations:
    sealedsecrets.bitnami.com/managed: "true"
spec:
  encryptedData:
    admin-user: REPLACE_WITH_KUBESEAL_OUTPUT
    admin-password: REPLACE_WITH_KUBESEAL_OUTPUT
  template:
    metadata:
      name: grafana-admin-secret
      namespace: monitoring
    type: Opaque
