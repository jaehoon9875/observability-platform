apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-common-config
  namespace: obs-apps
  labels:
    app.kubernetes.io/part-of: observability-platform
data:
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://tempo.monitoring:4318"
  OTEL_TRACES_EXPORTER: "otlp"
  OTEL_METRICS_EXPORTER: "none"
  OTEL_LOGS_EXPORTER: "none"
  # OTel Agent의 Logback MDC 계측 비활성화
  # micrometer-tracing-bridge-otel이 traceId/spanId를 MDC에 주입하므로
  # OTel Agent의 중복 주입(trace_id/span_id)을 방지한다.
  # 참고: https://opentelemetry.io/docs/zero-code/java/agent/instrumentation/logback/
  OTEL_INSTRUMENTATION_LOGBACK_MDC_ENABLED: "false"
