apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: obs-apps
  labels:
    app.kubernetes.io/name: payment-service
    app.kubernetes.io/part-of: observability-platform
spec:
  replicas: 1
  # 싱글노드 클러스터에서 CPU 자원이 부족해 롤링 업데이트 시 신규 파드가 Pending 상태로
  # 멈추는 문제가 반복됨. Recreate 전략으로 구 파드를 먼저 종료 후 신 파드를 기동한다.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
        app.kubernetes.io/name: payment-service
        app.kubernetes.io/part-of: observability-platform
    spec:
      containers:
        - name: payment-service
          image: ghcr.io/jaehoon9875/payment-service:sha-4c5a6a9355637d955d7c765a2aec75e4187693e7
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          # 민감하지 않은 설정은 ConfigMap에서 주입
          envFrom:
            - configMapRef:
                name: payment-service-config
          # DB 인증 정보는 Secret에서 주입
          env:
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: payment-service-secret
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: payment-service-secret
                  key: DB_PASSWORD
            # OTel Java Agent 설정
            - name: OTEL_SERVICE_NAME
              value: payment-service
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://tempo.monitoring:4318
            - name: OTEL_TRACES_EXPORTER
              value: otlp
            - name: OTEL_METRICS_EXPORTER
              value: none
            - name: OTEL_LOGS_EXPORTER
              value: none
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          # 앱 최초 기동 완료 확인 (성공 전까지 liveness/readiness probe 비활성화)
          # periodSeconds(10) * failureThreshold(20) = 최대 200초 기동 허용
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 20
          # 파드가 살아있는지 확인 (실패 시 재시작)
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            periodSeconds: 10
            failureThreshold: 3
          # 파드가 트래픽을 받을 준비가 됐는지 확인
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            periodSeconds: 10
            failureThreshold: 3
