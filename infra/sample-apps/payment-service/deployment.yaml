apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: observability-platform
  labels:
    app.kubernetes.io/name: payment-service
    app.kubernetes.io/part-of: observability-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
        app.kubernetes.io/name: payment-service
        app.kubernetes.io/part-of: observability-platform
    spec:
      containers:
        - name: payment-service
          image: jaehoon9875/payment-service:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          # 민감하지 않은 설정은 ConfigMap에서 주입
          envFrom:
            - configMapRef:
                name: payment-service-config
          # DB 인증 정보는 Secret에서 주입
          env:
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: payment-service-secret
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: payment-service-secret
                  key: DB_PASSWORD
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          # 파드가 살아있는지 확인 (실패 시 재시작)
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 3
          # 파드가 트래픽을 받을 준비가 됐는지 확인
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
