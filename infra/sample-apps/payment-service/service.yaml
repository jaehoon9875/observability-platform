apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: observability-platform
  labels:
    # ServiceMonitor의 matchLabels와 반드시 일치해야 Prometheus 스크랩 대상으로 인식됨
    app: payment-service
    app.kubernetes.io/name: payment-service
    app.kubernetes.io/part-of: observability-platform
spec:
  selector:
    app: payment-service
  ports:
    - name: http
      port: 8080
      targetPort: 8080
