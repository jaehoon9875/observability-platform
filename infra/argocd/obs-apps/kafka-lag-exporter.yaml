apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kafka-lag-exporter
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/jaehoon9875/observability-platform
    path: infra/manifests/custom-exporter
    targetRevision: main
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: obs-apps
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
