apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mysql-operator
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
    # ArgoCD v3.3+ 핵심: 서버 측에서 Diff를 계산하도록 위임하여 CRD 불일치 완벽 해소
    argocd.argoproj.io/compare-options: ServerSideDiff=true
spec:
  project: default
  sources:
    - repoURL: https://mysql.github.io/mysql-operator/
      chart: mysql-operator
      targetRevision: 2.2.7
      helm:
        valueFiles:
          - $values/infra/helm/mysql-operator/custom-values.yaml
    - repoURL: https://github.com/jaehoon9875/observability-platform
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: obs-apps
  # ServerSideDiff를 사용하므로 ignoreDifferences 블록은 삭제합니다.
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true