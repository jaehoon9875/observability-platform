apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sample-apps
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  # Deployment/Service/ConfigMap → obs-apps 네임스페이스
  # ServiceMonitor → manifests에 namespace: monitoring 명시되어 있으므로 그대로 적용됨
  # DB Secret(order/payment/notification-service-secret)은 각 서비스 폴더의
  # sealedsecret.yaml로 관리됨 → sealed-secrets 컨트롤러가 자동 복호화
  source:
    repoURL: https://github.com/jaehoon9875/observability-platform
    path: infra/manifests/sample-apps
    targetRevision: main
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: obs-apps
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
