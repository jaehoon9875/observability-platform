apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kafka-ui
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  # kafka Application이 먼저 sync된 후 적용해야 함 (bootstrapServers 연결 대상)
  sources:
    - repoURL: https://provectus.github.io/kafka-ui-charts
      chart: kafka-ui
      targetRevision: 0.7.6
      helm:
        valueFiles:
          - $values/infra/helm/kafka-ui/custom-values.yaml
    - repoURL: https://github.com/jaehoon9875/observability-platform
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: obs-apps
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
