apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-secrets
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/jaehoon9875/observability-platform
    targetRevision: main
    path: infra/manifests/monitoring-secrets
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    # sealed-secrets 컨트롤러 설치 및 kubeseal로 SealedSecret 생성 후 automated 활성화
    # docs/sealed-secrets-setup.md 참조
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
