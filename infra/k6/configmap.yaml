apiVersion: v1
kind: ConfigMap
metadata:
  name: k6-scripts
  namespace: observability-platform
data:
  order-flow.js: |
    import http from 'k6/http';
    import { check, sleep } from 'k6';
    import { Rate, Trend } from 'k6/metrics';

    const errorRate = new Rate('order_error_rate');
    const orderDuration = new Trend('order_duration_ms');

    export const options = {
      stages: [
        { duration: '1m', target: 10 },
        { duration: '3m', target: 10 },
        { duration: '1m', target: 0 },
      ],
      thresholds: {
        http_req_failed:            ['rate<0.001'],
        'http_req_duration{p(99)}': ['p(99)<500'],
        order_error_rate:           ['rate<0.001'],
      },
    };

    const BASE_URL = __ENV.BASE_URL || 'http://order-service:8080';
    const CUSTOMERS = [1001, 1002, 1003, 1004, 1005];
    const PRODUCTS  = [1, 2, 3, 4, 5];

    function randomItem(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    export default function () {
      const payload = JSON.stringify({
        productId:  randomItem(PRODUCTS),
        quantity:   Math.floor(Math.random() * 3) + 1,
        customerId: randomItem(CUSTOMERS),
      });
      const params = { headers: { 'Content-Type': 'application/json' }, timeout: '10s' };
      const res = http.post(`${BASE_URL}/api/orders`, payload, params);
      const success = check(res, {
        'status is 200 or 201': (r) => r.status === 200 || r.status === 201,
        'response time < 500ms': (r) => r.timings.duration < 500,
      });
      errorRate.add(!success);
      orderDuration.add(res.timings.duration);
      sleep(1);
    }

  spike-test.js: |
    import http from 'k6/http';
    import { check, sleep } from 'k6';
    import { Rate } from 'k6/metrics';

    const errorRate = new Rate('order_error_rate');

    export const options = {
      stages: [
        { duration: '1m',  target: 5  },
        { duration: '30s', target: 20 },
        { duration: '2m',  target: 20 },
        { duration: '30s', target: 5  },
        { duration: '1m',  target: 5  },
      ],
      thresholds: {
        http_req_failed: ['rate<0.5'],
      },
    };

    const BASE_URL = __ENV.BASE_URL || 'http://order-service:8080';
    const CUSTOMERS = [1001, 1002, 1003, 1004, 1005];
    const PRODUCTS  = [1, 2, 3, 4, 5];

    function randomItem(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    export default function () {
      const payload = JSON.stringify({
        productId:  randomItem(PRODUCTS),
        quantity:   Math.floor(Math.random() * 5) + 1,
        customerId: randomItem(CUSTOMERS),
      });
      const params = { headers: { 'Content-Type': 'application/json' }, timeout: '15s' };
      const res = http.post(`${BASE_URL}/api/orders`, payload, params);
      const success = check(res, {
        'status is 2xx': (r) => r.status >= 200 && r.status < 300,
      });
      errorRate.add(!success);
      sleep(0.3);
    }
