apiVersion: v1
kind: ConfigMap
metadata:
  name: slo-overview-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  slo-overview.json: |
    {
      "id": null,
      "uid": "slo-overview",
      "title": "SLO Overview",
      "tags": ["slo", "order-service"],
      "timezone": "browser",
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "schemaVersion": 36,
      "version": 1,
      "annotations": {
        "list": [
          {
            "name": "Alert Firing",
            "datasource": { "type": "prometheus" },
            "enable": true,
            "hide": false,
            "iconColor": "red",
            "expr": "ALERTS{job=~\"$job\", alertstate=\"firing\"}",
            "step": "60s",
            "titleFormat": "{{alertname}}",
            "textFormat": "{{alertname}} firing"
          }
        ]
      },
      "templating": {
        "list": [
          {
            "name": "job",
            "type": "query",
            "label": "서비스",
            "query": "label_values(http_server_requests_seconds_count, job)",
            "refresh": 2,
            "includeAll": false,
            "current": {}
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "가용성 (1h)",
          "description": "최근 1시간 기준 가용성. SLO 목표: 99.9%",
          "gridPos": { "x": 0, "y": 0, "w": 6, "h": 4 },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "max": 1,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 0.995 },
                  { "color": "green", "value": 0.999 }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "1 - (\n  (sum(rate(http_server_requests_seconds_count{job=\"$job\", status=~\"5..\"}[1h])) or vector(0))\n  /\n  sum(rate(http_server_requests_seconds_count{job=\"$job\"}[1h]))\n)",
              "legendFormat": "가용성",
              "refId": "A"
            }
          ]
        },
        {
          "id": 2,
          "type": "stat",
          "title": "에러율 (5m)",
          "description": "최근 5분 기준 5xx 에러율. SLO 임계치: 0.1%",
          "gridPos": { "x": 6, "y": 0, "w": 6, "h": 4 },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "background",
            "graphMode": "none"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.0005 },
                  { "color": "red", "value": 0.001 }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "(sum(rate(http_server_requests_seconds_count{job=\"$job\", status=~\"5..\"}[5m])) or vector(0))\n/\nsum(rate(http_server_requests_seconds_count{job=\"$job\"}[5m]))",
              "legendFormat": "에러율",
              "refId": "A"
            }
          ]
        },
        {
          "id": 3,
          "type": "stat",
          "title": "P99 응답시간 (5m)",
          "description": "최근 5분 기준 P99 레이턴시. SLO 목표: 500ms 이하",
          "gridPos": { "x": 12, "y": 0, "w": 6, "h": 4 },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "background",
            "graphMode": "none"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.3 },
                  { "color": "red", "value": 0.5 }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.99,\n  sum(rate(http_server_requests_seconds_bucket{job=\"$job\"}[5m])) by (le)\n)",
              "legendFormat": "P99",
              "refId": "A"
            }
          ]
        },
        {
          "id": 4,
          "type": "stat",
          "title": "초당 요청수 (5m)",
          "gridPos": { "x": 18, "y": 0, "w": 6, "h": 4 },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "value",
            "graphMode": "area"
          },
          "fieldConfig": {
            "defaults": { "unit": "reqps" }
          },
          "targets": [
            {
              "expr": "sum(rate(http_server_requests_seconds_count{job=\"$job\"}[5m]))",
              "legendFormat": "RPS",
              "refId": "A"
            }
          ]
        },
        {
          "id": 5,
          "type": "timeseries",
          "title": "에러율 추이",
          "gridPos": { "x": 0, "y": 4, "w": 12, "h": 8 },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "max": 1,
              "custom": { "lineWidth": 2 },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 0.001 }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "(sum(rate(http_server_requests_seconds_count{job=\"$job\", status=~\"5..\"}[5m])) or vector(0))\n/\nsum(rate(http_server_requests_seconds_count{job=\"$job\"}[5m]))",
              "legendFormat": "에러율",
              "refId": "A"
            }
          ]
        },
        {
          "id": 6,
          "type": "timeseries",
          "title": "응답시간 분포 (P50 / P95 / P99)",
          "gridPos": { "x": 12, "y": 4, "w": 12, "h": 8 },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": { "lineWidth": 2 }
            }
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum(rate(http_server_requests_seconds_bucket{job=\"$job\"}[5m])) by (le))",
              "legendFormat": "P50",
              "refId": "A"
            },
            {
              "expr": "histogram_quantile(0.95, sum(rate(http_server_requests_seconds_bucket{job=\"$job\"}[5m])) by (le))",
              "legendFormat": "P95",
              "refId": "B"
            },
            {
              "expr": "histogram_quantile(0.99, sum(rate(http_server_requests_seconds_bucket{job=\"$job\"}[5m])) by (le))",
              "legendFormat": "P99",
              "refId": "C"
            }
          ]
        },
        {
          "id": 7,
          "type": "timeseries",
          "title": "주문 처리 현황 (생성 / 실패)",
          "gridPos": { "x": 0, "y": 12, "w": 12, "h": 8 },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": { "lineWidth": 2 }
            }
          },
          "targets": [
            {
              "expr": "rate(order_created_total[5m])",
              "legendFormat": "주문 생성",
              "refId": "A"
            },
            {
              "expr": "rate(order_failed_total[5m])",
              "legendFormat": "주문 실패",
              "refId": "B"
            }
          ]
        },
        {
          "id": 9,
          "type": "timeseries",
          "title": "Pod 재시작 횟수",
          "description": "Pod crash/OOM 등으로 인한 재시작. HTTP 메트릭에 잡히지 않는 장애를 보완한다.",
          "gridPos": { "x": 0, "y": 20, "w": 12, "h": 8 },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": { "lineWidth": 2 },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1 },
                  { "color": "red", "value": 3 }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "increase(kube_pod_container_status_restarts_total{namespace=\"obs-apps\", container=~\"$job\"}[5m])",
              "legendFormat": "재시작 ({{pod}})",
              "refId": "A"
            }
          ]
        },
        {
          "id": 10,
          "type": "stat",
          "title": "Pod 가용성 (1h, scrape 기준)",
          "description": "Prometheus scrape 성공률 기준 가용성. pod가 down되면 up=0으로 반영된다.",
          "gridPos": { "x": 12, "y": 20, "w": 12, "h": 8 },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "area"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "max": 1,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 0.995 },
                  { "color": "green", "value": 0.999 }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "avg_over_time(up{job=~\"$job\"}[1h])",
              "legendFormat": "{{job}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 8,
          "type": "timeseries",
          "title": "payment-service 호출 시간",
          "gridPos": { "x": 12, "y": 12, "w": 12, "h": 8 },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": { "lineWidth": 2 }
            }
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.99, sum(rate(payment_call_duration_seconds_bucket[5m])) by (le))",
              "legendFormat": "P99",
              "refId": "A"
            },
            {
              "expr": "histogram_quantile(0.50, sum(rate(payment_call_duration_seconds_bucket[5m])) by (le))",
              "legendFormat": "P50",
              "refId": "B"
            }
          ]
        },
        {
          "id": 11,
          "type": "state-timeline",
          "title": "Alert 상태 (Firing 구간)",
          "description": "Firing 상태인 Alert을 시간축으로 표시한다. 빨간 블록 = Firing 구간.",
          "gridPos": { "x": 0, "y": 28, "w": 24, "h": 5 },
          "options": {
            "mergeValues": true,
            "showValue": "never",
            "alignValue": "left",
            "rowHeight": 0.9
          },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 1 }
                ]
              },
              "custom": { "fillOpacity": 70 },
              "mappings": [
                { "type": "value", "options": { "0": { "text": "Normal" } } },
                { "type": "value", "options": { "1": { "text": "Firing" } } }
              ]
            }
          },
          "targets": [
            {
              "expr": "ALERTS{job=~\"$job\", alertstate=\"firing\"} or vector(0)",
              "legendFormat": "{{alertname}}",
              "refId": "A",
              "instant": false,
              "range": true,
              "format": "time_series"
            }
          ]
        }
      ]
    }

